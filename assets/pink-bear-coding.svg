<svg width="620" height="260" viewBox="0 0 620 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="260" rx="22" fill="#0D1117"/>

  <!-- soft glow -->
  <circle cx="120" cy="70" r="55" fill="#F472B6" opacity="0.12">
    <animate attributeName="cx" values="110;135;110" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="78" r="65" fill="#FACC15" opacity="0.10">
    <animate attributeName="cx" values="500;465;500" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- moon -->
  <path d="M536 44C524 50 520 66 528 78C536 91 553 95 566 87C557 101 538 103 525 92C511 80 509 58 521 45C525 41 530 39 536 38C536 40 536 42 536 44Z" fill="#FDE68A"/>

  <!-- stars -->
  <g fill="#FDE68A">
    <path d="M72 52 L76 62 L86 66 L76 70 L72 80 L68 70 L58 66 L68 62 Z">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.7s" repeatCount="indefinite"/>
    </path>
    <path d="M168 38 L171 46 L179 49 L171 52 L168 60 L165 52 L157 49 L165 46 Z">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M462 48 L466 58 L476 62 L466 66 L462 76 L458 66 L448 62 L458 58 Z">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M553 140 L557 150 L567 154 L557 158 L553 168 L549 158 L539 154 L549 150 Z">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M84 165 L87 173 L95 176 L87 179 L84 187 L81 179 L73 176 L81 173 Z">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M398 96 L401 104 L409 107 L401 110 L398 118 L395 110 L387 107 L395 104 Z">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="310" y="42" text-anchor="middle" fill="#F8BBD0" font-size="21" font-family="Arial, sans-serif" font-weight="700">
    🧸 Currently Coding
  </text>

  <!-- desk -->
  <rect x="98" y="220" width="424" height="14" rx="7" fill="#2A1E2A"/>
  <rect x="115" y="233" width="390" height="8" rx="4" fill="#1E1721"/>

  <!-- bear body behind laptop -->
  <ellipse cx="310" cy="185" rx="70" ry="48" fill="#FF9FCB"/>
  <ellipse cx="310" cy="188" rx="42" ry="32" fill="#FFD7E8" opacity="0.75"/>

  <!-- ears -->
  <circle cx="250" cy="92" r="30" fill="#FF9FCB"/>
  <circle cx="370" cy="92" r="30" fill="#FF9FCB"/>
  <circle cx="250" cy="92" r="16" fill="#F472B6"/>
  <circle cx="370" cy="92" r="16" fill="#F472B6"/>

  <!-- head -->
  <circle cx="310" cy="125" r="66" fill="#FFA6CF"/>

  <!-- face details -->
  <circle cx="270" cy="139" r="10" fill="#FF7DB4" opacity="0.65"/>
  <circle cx="350" cy="139" r="10" fill="#FF7DB4" opacity="0.65"/>

  <ellipse cx="286" cy="116" rx="6.5" ry="9.5" fill="#211820">
    <animate attributeName="ry" values="9.5;9.5;1;9.5;9.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="334" cy="116" rx="6.5" ry="9.5" fill="#211820">
    <animate attributeName="ry" values="9.5;9.5;1;9.5;9.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="310" cy="142" rx="26" ry="20" fill="#FFF1F6"/>
  <circle cx="310" cy="134" r="5.5" fill="#A83B67"/>
  <path d="M310 141 Q300 150 292 145" stroke="#8A3359" stroke-width="3" stroke-linecap="round"/>
  <path d="M310 141 Q320 150 328 145" stroke="#8A3359" stroke-width="3" stroke-linecap="round"/>

  <!-- arms behind laptop, not covering screen -->
  <ellipse cx="240" cy="194" rx="31" ry="15" fill="#FF9FCB" transform="rotate(-18 240 194)">
    <animateTransform attributeName="transform" type="rotate" values="-18 240 194;-8 240 194;-18 240 194" dur="0.75s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="380" cy="194" rx="31" ry="15" fill="#FF9FCB" transform="rotate(18 380 194)">
    <animateTransform attributeName="transform" type="rotate" values="18 380 194;8 380 194;18 380 194" dur="0.75s" repeatCount="indefinite"/>
  </ellipse>

  <!-- laptop, taller and in front -->
  <rect x="225" y="165" width="170" height="82" rx="10" fill="#374151"/>
  <rect x="238" y="178" width="144" height="50" rx="5" fill="#111827"/>
  <rect x="242" y="182" width="136" height="42" rx="4" fill="#161B22"/>

<text x="310" y="199" text-anchor="middle" fill="#F8BBD0" font-size="12" font-family="Arial, sans-serif" font-weight="700">
  기술과 사용자를
</text>

<text x="310" y="216" text-anchor="middle" fill="#F8BBD0" font-size="12" font-family="Arial, sans-serif" font-weight="700">
  연결합니다.
</text>

<rect x="347" y="204" width="6" height="12" fill="#FACC15">
  <animate attributeName="opacity" values="1;0;1" dur="0.75s" repeatCount="indefinite"/>
</rect>

  <path d="M215 247 H405 L390 256 H230 Z" fill="#4B5563"/>
  <rect x="263" y="250" width="94" height="4" rx="2" fill="#6B7280"/>

  <!-- coffee -->
  <g transform="translate(440 158)">
    <rect x="0" y="34" width="40" height="32" rx="8" fill="#FFD1DC"/>
    <path d="M40 43C56 41 56 60 40 58" stroke="#FFD1DC" stroke-width="6" fill="none"/>
    <path d="M12 22C4 12 20 10 12 1" stroke="#F8BBD0" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 -8" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M28 23C20 13 36 11 28 2" stroke="#F8BBD0" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 -8" dur="2.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- small plant -->
  <g transform="translate(132 172)">
    <rect x="0" y="32" width="38" height="34" rx="6" fill="#F9A8D4"/>
    <path d="M19 31 C10 16 3 13 2 4 C14 5 20 13 19 31Z" fill="#86EFAC"/>
    <path d="M21 31 C31 18 38 17 40 8 C29 8 21 16 21 31Z" fill="#4ADE80"/>
    <path d="M19 31 C17 18 21 10 28 2 C33 13 29 23 19 31Z" fill="#22C55E"/>
  </g>
</svg>
